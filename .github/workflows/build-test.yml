name: CI

on:
  push:
    tags: ["*.*.*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # OIDC token for npm Trusted Publishing

jobs:
  ci:
    uses: agent-ix/nodejs-actions/.github/workflows/build-test.yml@main
    with:
      npm_registry: https://registry.npmjs.org
      trusted_publish: true
